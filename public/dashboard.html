<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoRoll | Routine Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-3xl font-bold">EchoRoll Calendar Sync</h1>
            <p class="text-blue-100 mt-2">Build your weekly schedule and connect it to your WhatsApp Bot.</p>
        </div>

        <div class="p-6 md:p-8">
            <div class="mb-8 p-4 bg-blue-50 rounded-lg border border-blue-100">
                <label class="block text-sm font-bold text-gray-700 mb-2">Your WhatsApp Number</label>
                <input type="text" id="phoneNumber" placeholder="e.g., 919876543210 (Country code, no +)" 
                       class="w-full md:w-1/2 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>

            <div id="classesContainer" class="space-y-4 mb-6">
                </div>

            <div class="flex flex-col md:flex-row justify-between items-center gap-4 border-t pt-6">
                <button type="button" onclick="addClassRow()" 
                        class="w-full md:w-auto px-6 py-3 bg-gray-100 text-gray-700 font-semibold rounded-lg hover:bg-gray-200 transition flex items-center justify-center gap-2">
                    <span>➕</span> Add Another Class
                </button>
                
                <button type="button" onclick="syncRoutine()" id="syncBtn"
                        class="w-full md:w-auto px-8 py-3 bg-green-600 text-white font-bold rounded-lg shadow-md hover:bg-green-700 transition flex items-center justify-center gap-2">
                    <span>🔄</span> Sync with WhatsApp
                </button>
            </div>

            <div id="statusMsg" class="mt-6 text-center font-bold hidden p-4 rounded-lg"></div>
        </div>
    </div>

    <script>
        // HTML template for a single class row (Updated with Professor box)
        const rowTemplate = `
            <div class="class-row grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-4 p-4 bg-white border border-gray-200 rounded-lg shadow-sm items-center relative group hover:border-blue-300 transition">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Day</label>
                    <select class="day-input w-full p-2 border rounded bg-gray-50 outline-none focus:ring-1 focus:ring-blue-500">
                        <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
                        <option>Thursday</option><option>Friday</option><option>Saturday</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Code</label>
                    <input type="text" placeholder="CS401" class="code-input w-full p-2 border rounded bg-gray-50 outline-none focus:ring-1 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Subject Name</label>
                    <input type="text" placeholder="Operating Systems" class="name-input w-full p-2 border rounded bg-gray-50 outline-none focus:ring-1 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Professor</label>
                    <input type="text" placeholder="Dr. Smith" class="prof-input w-full p-2 border rounded bg-gray-50 outline-none focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Start</label>
                    <input type="time" class="start-input w-full p-2 border rounded bg-gray-50 outline-none focus:ring-1 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">End</label>
                    <input type="time" class="end-input w-full p-2 border rounded bg-gray-50 outline-none focus:ring-1 focus:ring-blue-500" required>
                </div>
                <button onclick="this.parentElement.remove()" class="absolute -top-3 -right-3 bg-red-100 text-red-600 rounded-full w-8 h-8 flex items-center justify-center opacity-0 group-hover:opacity-100 transition shadow hover:bg-red-200">
                    ✕
                </button>
            </div>
        `;

        const container = document.getElementById('classesContainer');

        function addClassRow() {
            container.insertAdjacentHTML('beforeend', rowTemplate);
        }
        
        addClassRow();

        async function syncRoutine() {
            const phone = document.getElementById('phoneNumber').value.trim();
            const statusDiv = document.getElementById('statusMsg');
            const syncBtn = document.getElementById('syncBtn');

            if (!phone) {
                showStatus('⚠️ Please enter your WhatsApp number first.', 'bg-yellow-100 text-yellow-700');
                return;
            }

            const rows = document.querySelectorAll('.class-row');
            const classesData = [];
            let isValid = true;

            rows.forEach(row => {
                const day = row.querySelector('.day-input').value;
                const code = row.querySelector('.code-input').value.toUpperCase();
                const name = row.querySelector('.name-input').value;
                const prof = row.querySelector('.prof-input').value; // <-- Fetches Professor Name
                const start = row.querySelector('.start-input').value;
                const end = row.querySelector('.end-input').value;

                if (!code || !name || !start || !end) isValid = false;

                classesData.push({
                    day_of_week: day,
                    subject_code: code,
                    subject_name: name,
                    professor_name: prof, // <-- Adds it to the JSON payload
                    start_time: start,
                    end_time: end
                });
            });

            if (!isValid || classesData.length === 0) {
                showStatus('⚠️ Please fill out all required fields for your classes.', 'bg-yellow-100 text-yellow-700');
                return;
            }

            syncBtn.disabled = true;
            syncBtn.innerHTML = '⏳ Syncing...';

            try {
                const response = await fetch('/api/sync-routine', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone_number: phone, classes: classesData })
                });

                const result = await response.json();

                if (response.ok) {
                    showStatus(`✅ ${result.message} You can now text the bot!`, 'bg-green-100 text-green-700');
                } else {
                    throw new Error('Sync failed');
                }
            } catch (error) {
                showStatus('❌ Error connecting to server. Try again.', 'bg-red-100 text-red-700');
            } finally {
                syncBtn.disabled = false;
                syncBtn.innerHTML = '<span>🔄</span> Sync with WhatsApp';
            }
        }

        function showStatus(msg, classes) {
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.className = `mt-6 text-center font-bold p-4 rounded-lg block ${classes}`;
            statusDiv.textContent = msg;
        }
    </script>
</body>
</html>
